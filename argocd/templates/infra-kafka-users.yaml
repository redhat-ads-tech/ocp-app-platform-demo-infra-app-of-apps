apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-kafka-users
  namespace: {{ .Values.gitopsNamespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ .Values.kafkaNamespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: kafka-users
    repoURL: https://{{ .Values.gitlabHost }}/rhdh/infra-app-of-apps.git
    targetRevision: main
    directory:
      recurse: false
      include: "*.yaml"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
